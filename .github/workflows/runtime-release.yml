name: Release npm Runtime

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-runtime:
    name: Runtime ${{ matrix.platformArch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platformArch: darwin-arm64
            os: macos-14
          - platformArch: darwin-x64
            os: macos-15-intel
          - platformArch: win32-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      SOCRATES_RUNTIME_PLATFORM_ARCH: ${{ matrix.platformArch }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build runtime archive
        run: pnpm runtime:archive
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platformArch }}
          path: release-artifacts/socrates-runtime-${{ matrix.platformArch }}.zip

  publish-runtime:
    name: Publish runtime release
    runs-on: ubuntu-latest
    needs: [build-runtime]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          (cd release-artifacts && sha256sum socrates-runtime-*.zip > SHA256SUMS)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-artifacts/* \
              --title "Socrates $GITHUB_REF_NAME" \
              --notes "Unsigned Socrates npm runtime bundles for macOS and Windows. Install with: npx @socrates-ai/cli"
          fi
