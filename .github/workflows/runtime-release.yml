name: Release npm Runtime

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-runtime:
    name: Runtime ${{ matrix.platformArch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platformArch: darwin-arm64
            # Whisper 1.0.22's native addon targets macOS 15 or newer.
            os: macos-15
          - platformArch: darwin-x64
            os: macos-15-intel
          - platformArch: win32-x64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    env:
      SOCRATES_RUNTIME_PLATFORM_ARCH: ${{ matrix.platformArch }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build runtime archive
        run: pnpm runtime:archive
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platformArch }}
          path: release-artifacts/socrates-runtime-${{ matrix.platformArch }}.zip

  publish-runtime:
    name: Publish runtime release
    runs-on: ubuntu-latest
    needs: [build-runtime]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          (cd release-artifacts && sha256sum socrates-runtime-*.zip > SHA256SUMS)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ls -lh release-artifacts

          gh release delete "$GITHUB_REF_NAME" --yes >/dev/null 2>&1 || true
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "Socrates $GITHUB_REF_NAME" \
            --notes "Unsigned Socrates npm runtime bundles for macOS and Windows. Install with: npx @socrates-ai/cli"

          for asset in \
            release-artifacts/socrates-runtime-darwin-arm64.zip \
            release-artifacts/socrates-runtime-darwin-x64.zip \
            release-artifacts/socrates-runtime-win32-x64.zip \
            release-artifacts/SHA256SUMS
          do
            test -f "$asset"
            echo "::group::Upload $(basename "$asset")"
            timeout 20m gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
            echo "::endgroup::"
          done
