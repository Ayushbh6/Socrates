<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socrates</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8f5f0;
        color: #1f2933;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        max-width: 32rem;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 3rem;
        font-weight: 400;
      }

      p {
        margin: 0;
        color: #667085;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Socrates</h1>
      <p>Start the desktop app with <code>pnpm desktop:dev</code> from the repository root.</p>
    </main>
  </body>
</html>
