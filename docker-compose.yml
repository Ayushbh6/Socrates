services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: premchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: premchat
      POSTGRES_USER: premchat
      POSTGRES_PASSWORD: premchat
    ports:
      - "5433:5432"
    volumes:
      - premchat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U premchat -d premchat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  premchat_postgres_data:
