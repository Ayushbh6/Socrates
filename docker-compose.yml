name: socrates

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SOCRATES_HOME: /app-data
      SOCRATES_HOME_HOST: ${PWD}/app-data
      APP_DATA_DIR: /app-data
      HOST_WORKSPACES_DIR: /host-workspaces
    volumes:
      - ./app-data:/app-data
      - ./host-workspaces:/host-workspaces
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
